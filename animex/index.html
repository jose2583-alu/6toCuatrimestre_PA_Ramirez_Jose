<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeX — Iniciar Sesión</title>
<link rel="stylesheet" href="assets/css/global.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }

  /* Animated background */
  .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .orb {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: .18; animation: drift 8s ease-in-out infinite;
  }
  .orb-1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
  .orb-2 { width: 300px; height: 300px; background: #6a0dad; bottom: -80px; right: 10%; animation-delay: 3s; }
  .orb-3 { width: 200px; height: 200px; background: var(--blue); top: 40%; right: -60px; animation-delay: 5s; }
  @keyframes drift { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(20px,−20px) scale(1.08); } }

  .auth-wrap { position: relative; z-index: 1; width: 100%; max-width: 440px; padding: 20px; }

  .logo { text-align: center; margin-bottom: 36px; }
  .logo h1 { font-family: 'Bebas Neue', sans-serif; font-size: 64px; color: var(--accent); letter-spacing: 5px; line-height: 1; }
  .logo p  { color: var(--text2); font-size: 12px; letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }

  .auth-card {
    background: rgba(18,18,31,.96); border: 1px solid rgba(230,57,70,.25);
    border-radius: 20px; padding: 36px 32px; backdrop-filter: blur(24px);
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }

  .tabs { display: flex; gap: 0; margin-bottom: 28px; background: var(--bg3); border-radius: var(--radius-sm); padding: 4px; }
  .tab-btn {
    flex: 1; padding: 10px; background: transparent; border: none;
    border-radius: 6px; color: var(--text2); font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 800; cursor: pointer; transition: all .2s;
  }
  .tab-btn.active { background: var(--accent); color: #fff; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .auth-btn {
    width: 100%; padding: 13px; background: var(--accent); border: none;
    border-radius: var(--radius-sm); color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 800; cursor: pointer; transition: all .2s;
    letter-spacing: .5px; margin-top: 8px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .auth-btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .auth-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

  .error-msg {
    background: rgba(230,57,70,.12); border: 1px solid rgba(230,57,70,.4);
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: 13px; color: var(--accent2); margin-bottom: 16px; display: none;
  }
  .hint { text-align: center; margin-top: 18px; font-size: 12px; color: var(--text3); }
  .hint strong { color: var(--text2); }

  .divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; color: var(--text3); font-size: 12px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.08); }

  .pass-wrap { position: relative; }
  .pass-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 4px;
  }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="auth-wrap">
  <div class="logo">
    <h1>ANIMEX</h1>
    <p>El mundo del anime en tus manos</p>
  </div>

  <div class="auth-card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Iniciar Sesión</button>
      <button class="tab-btn"        onclick="switchTab('register')">Registrarse</button>
    </div>

    <!-- ── LOGIN ── -->
    <div id="panel-login" class="tab-panel active">
      <div class="error-msg" id="login-error"></div>
      <div class="form-group">
        <label>Usuario o Correo</label>
        <input type="text" id="l-user" placeholder="Ingresa tu usuario o correo" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <div class="pass-wrap">
          <input type="password" id="l-pass" placeholder="Contraseña" autocomplete="current-password"
            onkeydown="if(event.key==='Enter') doLogin()">
          <button class="pass-toggle" type="button" onclick="togglePass('l-pass',this)">👁</button>
        </div>
      </div>
      <button class="auth-btn" id="login-btn" onclick="doLogin()">
        <span>Ingresar</span>
      </button>
      <div class="hint">Demo → Admin: <strong>admin / admin123</strong> · Usuario: <strong>usuario / user123</strong></div>
    </div>

    <!-- ── REGISTER ── -->
    <div id="panel-register" class="tab-panel">
      <div class="error-msg" id="reg-error"></div>
      <div class="form-group">
        <label>Nombre de Usuario</label>
        <input type="text" id="r-user" placeholder="Ej: otaku_ninja" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" id="r-email" placeholder="tu@correo.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <div class="pass-wrap">
          <input type="password" id="r-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password"
            onkeydown="if(event.key==='Enter') doRegister()">
          <button class="pass-toggle" type="button" onclick="togglePass('r-pass',this)">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label>Confirmar Contraseña</label>
        <div class="pass-wrap">
          <input type="password" id="r-pass2" placeholder="Repite la contraseña"
            onkeydown="if(event.key==='Enter') doRegister()">
          <button class="pass-toggle" type="button" onclick="togglePass('r-pass2',this)">👁</button>
        </div>
      </div>
      <button class="auth-btn" id="reg-btn" onclick="doRegister()">
        <span>Crear Cuenta</span>
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="assets/js/api.js"></script>
<script>
  // Si ya hay sesión, redirigir
  (async () => {
    const s = await API.session().catch(() => null);
    if (s?.loggedIn) redirect(s.user.rol);
  })();

  function redirect(rol) {
    window.location.href = rol === 'admin' ? 'admin/index.html' : 'user/index.html';
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
  }

  function togglePass(inputId, btn) {
    const inp = document.getElementById(inputId);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<div class="loader"></div>' : btn.dataset.label || btn.innerHTML;
  }

  async function doLogin() {
    const u = document.getElementById('l-user').value.trim();
    const p = document.getElementById('l-pass').value;
    const err = document.getElementById('login-error');
    err.style.display = 'none';
    if (!u || !p) { err.textContent = 'Completa todos los campos'; err.style.display = 'block'; return; }

    document.getElementById('login-btn').innerHTML = '<div class="loader"></div>';
    document.getElementById('login-btn').disabled = true;

    try {
      const res = await API.login(u, p);
      showToast('¡Bienvenido, ' + res.user.username + '! 🎌');
      setTimeout(() => redirect(res.user.rol), 700);
    } catch (e) {
      err.textContent = e.message;
      err.style.display = 'block';
      document.getElementById('login-btn').innerHTML = '<span>Ingresar</span>';
      document.getElementById('login-btn').disabled = false;
    }
  }

  async function doRegister() {
    const u  = document.getElementById('r-user').value.trim();
    const em = document.getElementById('r-email').value.trim();
    const p  = document.getElementById('r-pass').value;
    const p2 = document.getElementById('r-pass2').value;
    const err = document.getElementById('reg-error');
    err.style.display = 'none';

    if (!u || !em || !p) { err.textContent = 'Completa todos los campos'; err.style.display = 'block'; return; }
    if (p !== p2) { err.textContent = 'Las contraseñas no coinciden'; err.style.display = 'block'; return; }
    if (p.length < 6) { err.textContent = 'La contraseña debe tener al menos 6 caracteres'; err.style.display = 'block'; return; }

    document.getElementById('reg-btn').innerHTML = '<div class="loader"></div>';
    document.getElementById('reg-btn').disabled = true;

    try {
      const res = await API.register(u, em, p);
      showToast('¡Cuenta creada! Bienvenido, ' + res.user.username + ' 🎉');
      setTimeout(() => redirect(res.user.rol), 700);
    } catch (e) {
      err.textContent = e.message;
      err.style.display = 'block';
      document.getElementById('reg-btn').innerHTML = '<span>Crear Cuenta</span>';
      document.getElementById('reg-btn').disabled = false;
    }
  }
</script>
</body>
</html>
